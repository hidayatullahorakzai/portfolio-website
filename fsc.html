<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSC | Cadet College Spinkai</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; }

    body, html {
        height: 100%;
        font-family: 'Segoe UI', sans-serif;
    }

    /* Full-page FSC Hero */
    .fsc-hero {
        position: relative;
        width: 100%;
        height: 100vh; /* Full viewport height */
        background: url('fsc-cover.jpg') center/cover no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: white;
    }

    .fsc-hero::after {
        content: '';
        position: absolute;
        top:0; left:0;
        width:100%; height:100%;
        background-color: rgba(0,0,0,0.45); /* Dark overlay for readability */
    }

    .fsc-content {
        position: relative;
        z-index: 2;
        max-width: 800px;
        padding: 20px;
    }

    .fsc-content h1 {
        font-size: 48px;
        margin-bottom: 20px;
        font-weight: 700;
    }

    .fsc-content p {
        font-size: 20px;
        line-height: 1.6;
        font-weight: 500;
    }

    .fsc-content a {
        display: inline-block;
        margin-top: 25px;
        padding: 12px 25px;
        background: #1e3a8a;
        color: white;
        border-radius: 8px;
        text-decoration: none;
        font-weight: 600;
        transition: background 0.3s;
    }

    .fsc-content a:hover {
        background: #2563eb;
    }
</style>
</head>
<body>

<section class="fsc-hero">
    <div class="fsc-content">
        <h1>Cadet College Spinkai</h1>
        <p>
            I completed my FSC (Pre-Medical) in 2023 with 87% from Cadet College Spinkai, South Waziristan Tribal District.
            The college provided a professional military environment, morning drills, PT sessions, and advanced facilities for overall development.
        </p>
        <a href="myweb.html">← Back to Portfolio</a>
    </div>
</section>

</body>
</html>
